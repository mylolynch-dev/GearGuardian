# ==============================================================================
# Gear Guardian — Zephyr project configuration
# Target: ESP32-S3 DevKitC-1
# ==============================================================================

# ------------------------------------------------------------------------------
# Core kernel
# ------------------------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ------------------------------------------------------------------------------
# Logging and debug output
# ------------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# ------------------------------------------------------------------------------
# I2C — for ICM-20948 IMU
# ------------------------------------------------------------------------------
CONFIG_I2C=y

# ------------------------------------------------------------------------------
# SPI — for SSD1306 OLED and microSD card
# ------------------------------------------------------------------------------
CONFIG_SPI=y

# ------------------------------------------------------------------------------
# GPIO — reed switch, mode button, buzzer
# ------------------------------------------------------------------------------
CONFIG_GPIO=y

# ------------------------------------------------------------------------------
# Display — SSD1306 OLED via Zephyr display subsystem
#
# SSD1306 OLED via Zephyr display subsystem (SPI2)
# ------------------------------------------------------------------------------
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# ------------------------------------------------------------------------------
# microSD card — FATFS over SPI (DISABLED until SD card is wired)
#
# microSD card — FATFS over SPI (SPI3)
# ------------------------------------------------------------------------------
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MOUNT_MKFS=n

# ------------------------------------------------------------------------------
# NVS — Non-Volatile Storage for boot metadata
#
# Requires a "storage" partition in the devicetree overlay.
# TODO: verify flash partition offsets after first build.
# ------------------------------------------------------------------------------
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# ------------------------------------------------------------------------------
# Hardware info — reset cause detection
# ------------------------------------------------------------------------------
CONFIG_HWINFO=y

# ------------------------------------------------------------------------------
# Kernel features
# k_timer and k_msgq are always available; no Kconfig needed.
# ------------------------------------------------------------------------------
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ------------------------------------------------------------------------------
# Floating point — hardware FPU on Xtensa ESP32-S3
# ------------------------------------------------------------------------------
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# ------------------------------------------------------------------------------
# Watchdog (Phase 6 — enable after core functionality is stable)
# ------------------------------------------------------------------------------
# CONFIG_WATCHDOG=y

# ------------------------------------------------------------------------------
# Stack overflow detection (useful during development)
# ------------------------------------------------------------------------------
CONFIG_STACK_SENTINEL=y

# ------------------------------------------------------------------------------
# Thread analysis (enable in diagnostic mode / development builds)
# ------------------------------------------------------------------------------
# CONFIG_THREAD_STACK_INFO=y
# CONFIG_INIT_STACKS=y
